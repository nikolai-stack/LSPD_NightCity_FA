<!-- ========================= -->
<!-- 🔎 BARRE DE RECHERCHE GLOBALE BCSO -->
<!-- ========================= -->

<section id="search-system">

    <h2>🔎 Recherche rapide BCSO</h2>

    <p>
        Recherchez instantanément une infraction, un article du code pénal,
        un code radio, une division, une arme, un grade ou une procédure.
    </p>

    <input
        type="text"
        id="searchInput"
        placeholder="Exemple : prise d'otage, 10-31, SWAT, homicide..."
        style="
        width:100%;
        padding:15px;
        border-radius:12px;
        border:none;
        outline:none;
        background:#1b1b1b;
        color:white;
        font-size:16px;
        margin-top:20px;
        margin-bottom:25px;
        "
    >

    <div id="searchResults"></div>

</section>

<!-- ========================= -->
<!-- 📚 BASE DE DONNÉES -->
<!-- ========================= -->

<script>

const database = [

    {
        title: "10-31",
        category: "📻 Code Radio",
        content: "Tirs d'armes à feu"
    },

    {
        title: "10-93",
        category: "📻 Code Radio",
        content: "Prise d'otage"
    },

    {
        title: "Prise d'otage",
        category: "⚖️ Code pénal",
        content: "250 000$ | 55 mois de prison"
    },

    {
        title: "Homicide volontaire",
        category: "⚖️ Code pénal",
        content: "600 000$ | 95 mois de prison"
    },

    {
        title: "SWAT",
        category: "🛡️ Division",
        content: "Accessible à partir du grade Deputy Sheriff III"
    },

    {
        title: "Deputy Sheriff Trainee",
        category: "👮 Grade",
        content: "Formation obligatoire avant montée en grade"
    },

    {
        title: "PPA Léger",
        category: "🔫 Armement",
        content: "Autorise uniquement les armes type Beretta"
    },

    {
        title: "Command Staff",
        category: "⭐ Hiérarchie",
        content: "Grades supérieurs du BCSO"
    }

];

const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");

searchInput.addEventListener("keyup", function() {

    let filter = searchInput.value.toLowerCase();

    searchResults.innerHTML = "";

    if(filter.length === 0) {
        return;
    }

    let filtered = database.filter(item =>
        item.title.toLowerCase().includes(filter) ||
        item.content.toLowerCase().includes(filter)
    );

    if(filtered.length === 0) {

        searchResults.innerHTML = `
            <div style="
                background:#2a0000;
                padding:15px;
                border-radius:10px;
                color:white;
            ">
                ❌ Aucun résultat trouvé
            </div>
        `;

        return;
    }

    filtered.forEach(item => {

        searchResults.innerHTML += `

            <div style="
                background:#111827;
                margin-bottom:15px;
                padding:20px;
                border-radius:12px;
                border-left:5px solid #facc15;
                transition:0.3s;
            ">

                <h3 style="
                    margin:0;
                    color:#facc15;
                ">
                    ${item.title}
                </h3>

                <p style="
                    margin-top:8px;
                    color:#9ca3af;
                ">
                    ${item.category}
                </p>

                <p style="
                    margin-top:10px;
                    color:white;
                ">
                    ${item.content}
                </p>

            </div>

        `;

    });

});

</script>
