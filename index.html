<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSPD NightCity FA — Manuel RP</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: #06111f;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(21,56,100,0.45) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(10,30,60,0.4) 0%, transparent 60%),
        url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Los_Santos_Police_Department_Logo.png/240px-Los_Santos_Police_Department_Logo.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 520px 520px;
      background-attachment: fixed;
      color: #e8edf5;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 15%, rgba(12,68,124,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 85%, rgba(4,44,83,0.22) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .doc-header {
      background: rgba(6,17,31,0.82);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(53,110,180,0.35);
      border-top: 3px solid #c9a84c;
      border-radius: 14px;
      padding: 36px 40px 30px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 28px;
      position: relative;
      overflow: hidden;
    }

    .header-logo {
      width: 88px;
      height: 88px;
      flex-shrink: 0;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
    }

    .header-text { flex: 1; }

    .server-tag {
      display: inline-block;
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.4);
      color: #c9a84c;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 3px 12px;
      border-radius: 4px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .doc-header h1 {
      font-size: 30px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .doc-header h2 {
      font-size: 16px;
      font-weight: 400;
      color: #7a9cbf;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .header-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.8) 0%, rgba(232,208,138,0.6) 50%, rgba(201,168,76,0.2) 100%);
      margin-bottom: 12px;
    }

    .header-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .meta-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #5a7a9a;
      font-family: 'Share Tech Mono', monospace;
    }
