<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSPD NightCity FA — Manuel Opérationnel Intégral</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════ RESET & BASE ═══════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #06111f;
  --navy2:   #0a1a30;
  --blue1:   #153764;
  --blue2:   #378ADD;
  --blue3:   #85B7EB;
  --gold:    #c9a84c;
  --gold2:   #e8d08a;
  --gold3:   #FAC775;
  --teal1:   #1D9E75;
  --teal2:   #5DCAA5;
  --red1:    #E24B4A;
  --red2:    #F09595;
  --green1:  #639922;
  --green2:  #97C459;
  --text:    #e8edf5;
  --text2:   #c5d8ee;
  --muted:   #7a9cbf;
  --dim:     #4a6a8a;
  --glass:   rgba(10,22,42,0.85);
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--navy);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* ═══════════════ BACKGROUND ═══════════════ */
.bg-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%, rgba(21,56,100,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% 90%, rgba(10,30,60,0.40) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 60%);
}

.bg-logo {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 580px; height: 580px;
  object-fit: contain;
  opacity: 0.035;
  pointer-events: none;
  z-index: 0;
  filter: grayscale(1);
}

/* ═══════════════ LAYOUT ═══════════════ */
.app-shell {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ═══════════════ SIDEBAR ═══════════════ */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: rgba(4,10,20,0.94);
  border-right: 1px solid rgba(201,168,76,0.15);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s ease;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(201,168,76,0.12);
  display: flex;
  align-items: center;
  gap: 14px;
}

.sidebar-logo {
  width: 48px; height: 48px;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(201,168,76,0.3));
  flex-shrink: 0;
}

.brand-name {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 1px;
  line-height: 1.1;
}
.brand-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 2px;
  margin-top: 3px;
}

.nav-section { padding: 12px 0 4px; }

.nav-section-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 0 20px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all 0.15s ease;
  border-left: 2px solid transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-item:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text2);
  border-left-color: rgba(255,255,255,0.15);
}

.nav-item.active { border-left-color: var(--blue2); }
.nav-item.active.c-gold  { background: rgba(201,168,76,0.1);  color: var(--gold2); border-left-color: var(--gold); }
.nav-item.active.c-teal  { background: rgba(29,158,117,0.1);  color: var(--teal2); border-left-color: var(--teal1); }
.nav-item.active.c-red   { background: rgba(226,75,74,0.1);   color: var(--red2);  border-left-color: var(--red1); }
.nav-item.active.c-green { background: rgba(99,153,34,0.1);   color: var(--green2); border-left-color: var(--green1); }
.nav-item.active.c-blue  { background: rgba(55,138,221,0.1);  color: var(--blue3); border-left-color: var(--blue2); }

.nav-icon { font-size: 14px; width: 18px; text-align: center; }

.nav-badge {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  color: var(--dim);
}

/* ═══════════════ MAIN CONTENT ═══════════════ */
.main {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
  padding: 32px 36px 80px;
  max-width: 100%;
}

/* ═══════════════ TOPBAR ═══════════════ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.page-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.page-title {
  font-family: 'Oswald', sans-serif;
  font-size: 28px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 1px;
  line-height: 1.1;
}

.page-title span { color: var(--gold); }

.topbar-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.tpill {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--dim);
  letter-spacing: 1px;
}

/* ═══════════════ SECTIONS ═══════════════ */
.section { display: none; }
.section.visible { display: block; }

/* ═══════════════ HERO BANNER ═══════════════ */
.hero-banner {
  background: linear-gradient(135deg, rgba(21,55,100,0.5) 0%, rgba(6,17,31,0.9) 100%);
  border: 1px solid rgba(55,138,221,0.2);
  border-top: 3px solid var(--gold);
  border-radius: 14px;
  padding: 28px 32px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.hero-banner::before {
  content: '';
  position: absolute;
  top: -1px; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, transparent 100%);
}

.hero-banner::after {
  content: 'LSPD';
  position: absolute;
  right: 28px; top: 50%;
  transform: translateY(-50%);
  font-family: 'Oswald', sans-serif;
  font-size: 72px;
  font-weight: 700;
  color: rgba(255,255,255,0.025);
  letter-spacing: 8px;
  pointer-events: none;
}

.hero-pre {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 8px;
}

.hero-h {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 10px;
  line-height: 1.15;
}

.hero-p {
  font-size: 14px;
  color: var(--muted);
  max-width: 620px;
  line-height: 1.7;
}

/* ═══════════════ GRID CARDS ═══════════════ */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  margin-bottom: 14px;
}

.cards-grid-3 {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 14px;
  margin-bottom: 14px;
}

.card {
  background: var(--glass);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  transition: border-color 0.18s, transform 0.18s;
}

.card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 16px;
}

.card-id {
  display: flex;
  align-items: center;
  gap: 12px;
}

.card-ico {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}

.ico-blue  { background: rgba(21,95,165,0.25);  color: var(--blue3);  border: 1px solid rgba(55,138,221,0.3); }
.ico-amber { background: rgba(186,117,23,0.2);   color: var(--gold3);  border: 1px solid rgba(239,159,39,0.3); }
.ico-teal  { background: rgba(15,110,86,0.2);    color: var(--teal2);  border: 1px solid rgba(29,158,117,0.3); }
.ico-red   { background: rgba(163,45,45,0.2);    color: var(--red2);   border: 1px solid rgba(226,75,74,0.3); }
.ico-green { background: rgba(39,80,10,0.25);   color: var(--green2); border: 1px solid rgba(99,153,34,0.3); }

.card-name { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.2; }
.card-sub  { font-size: 11px; color: var(--dim); margin-top: 2px; font-family: 'Share Tech Mono', monospace; }

/* ═══════════════ BADGE ═══════════════ */
.badge {
  font-size: 10px;
  font-family: 'Share Tech Mono', monospace;
  padding: 3px 10px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.badge-blue  { background: rgba(21,95,165,0.2);  color: var(--blue3);  border: 1px solid rgba(55,138,221,0.25); }
.badge-amber { background: rgba(186,117,23,0.2); color: var(--gold3);  border: 1px solid rgba(239,159,39,0.25); }
.badge-teal  { background: rgba(15,110,86,0.2);  color: var(--teal2);  border: 1px solid rgba(29,158,117,0.25); }
.badge-red   { background: rgba(163,45,45,0.2);  color: var(--red2);   border: 1px solid rgba(226,75,74,0.25); }
.badge-green { background: rgba(39,80,10,0.2);   color: var(--green2); border: 1px solid rgba(99,153,34,0.25); }

/* ═══════════════ CHIPS / ITEMS ═══════════════ */
.chips-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 14px;
}

.chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 7px 13px;
  min-width: 65px;
}

.chip-lbl { font-size: 9px; color: var(--dim); margin-bottom: 4px; font-family: 'Share Tech Mono', monospace; text-transform: uppercase; }
.chip-val { font-size: 13px; font-weight: 700; color: var(--text2); font-family: 'Share Tech Mono', monospace; }

/* ═══════════════ DEFCON ROW ═══════════════ */
.defcon-row {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.dc {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-family: 'Share Tech Mono', monospace;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid;
  flex: 1;
  min-width: 140px;
}
.dc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dc-green  { background: rgba(39,80,10,0.2);   border-color: rgba(99,153,34,0.3);  color: var(--green2); }
.dc-green  .dc-dot { background: var(--green1); }
.dc-orange { background: rgba(99,56,6,0.2);    border-color: rgba(239,159,39,0.3); color: var(--gold3); }
.dc-orange .dc-dot { background: #EF9F27; }
.dc-red    { background: rgba(121,31,31,0.2);  border-color: rgba(226,75,74,0.3);  color: var(--red2); }
.dc-red    .dc-dot { background: var(--red1); }

/* ═══════════════ GROUP CARD ═══════════════ */
.group-card {
  background: var(--glass);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 14px;
}

.group-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.grades-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.grade-row-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 6px;
}

.grade-title-txt { font-weight: 600; font-size: 14px; color: var(--text2); }
.grade-desc-txt { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); }

/* ═══════════════ INFO BLOCK ═══════════════ */
.info-block {
  background: rgba(10,22,42,0.7);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue2);
  border-radius: 8px;
  padding: 14px 18px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
}

.info-block.warn { border-left-color: var(--gold); }
.info-block.danger { border-left-color: var(--red1); }
.info-block.success { border-left-color: var(--teal1); }
.info-block strong { color: var(--text2); font-weight: 600; }

/* ═══════════════ DEFCON EXPLAINER ═══════════════ */
.defcon-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
}

.defcon-table th {
  text-align: left;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border2);
  color: var(--dim);
  font-weight: 400;
  letter-spacing: 1px;
  font-size: 10px;
  text-transform: uppercase;
}

.defcon-table td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.defcon-table tr:last-child td { border-bottom: none; }
.defcon-table tr:hover td { background: rgba(255,255,255,0.01); }

.dc-level {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
}

/* ═══════════════ PROCEDURE STEPS ═══════════════ */
.steps-list {
  counter-reset: step;
  list-style: none;
  margin-bottom: 16px;
}

.step-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  counter-increment: step;
}

.step-item:last-child { border-bottom: none; }

.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(55,138,221,0.15);
  border: 1px solid rgba(55,138,221,0.3);
  color: var(--blue3);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.step-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.step-desc  { font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; line-height: 1.7; }

/* ═══════════════ CODE MATRICE TABLE ═══════════════ */
.code-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 14px;
}
.code-table td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
}
.code-table tr:last-child td { border-bottom: none; }
.code-table font {
  font-family: 'Share Tech Mono', monospace;
  font-weight: 700;
  color: var(--gold3);
  display: inline-block;
  width: 65px;
}

/* ═══════════════ COMMANDEMENT CARD ═══════════════ */
.cmd-card {
  background: rgba(60,20,20,0.35);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(226,75,74,0.2);
  border-top: 3px solid rgba(201,168,76,0.7);
  border-radius: 12px;
  padding: 22px 24px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 14px;
}
.cmd-ico   { font-size: 30px; flex-shrink: 0; line-height: 1; }
.cmd-title { font-size: 18px; font-weight: 700; color: var(--gold2); margin-bottom: 6px; font-family: 'Oswald', sans-serif; }
.cmd-body  { font-size: 13px; color: #dcd0d0; font-family: 'Share Tech Mono', monospace; line-height: 1.8; }

/* ═══════════════ ALERT BOX ═══════════════ */
.alert {
  display: flex;
  gap: 12px;
  background: rgba(186,117,23,0.1);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 8px;
  padding: 14px 18px;
  margin-bottom: 16px;
  font-size: 13px;
  color: #d4b060;
  font-family: 'Share Tech Mono', monospace;
  line-height: 1.7;
}
.alert.danger { background: rgba(163,45,45,0.12); border-color: rgba(226,75,74,0.25); color: var(--red2); }
.alert-icon { font-size: 18px; flex-shrink: 0; }

/* ═══════════════ RULE LINE ═══════════════ */
.rule-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 10px;
